name: Windows RDP – Reliable Fix (Corrected)

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    steps:
      - name: Enable RDP and Configure Firewall
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          New-NetFirewallRule -DisplayName "Allow RDP All Profiles" -Direction Inbound -Protocol TCP -LocalPort 3389 -Action Allow -Profile Any
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Set User Password and Add to Groups
        run: |
          $password = ConvertTo-SecureString "YourPass123!" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $password
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "runneradmin" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators" -Member "runneradmin" -ErrorAction SilentlyContinue

      - name: Disable NLA and Restart Services
        run: |
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name 'UserAuthentication' -Value 0
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name 'SecurityLayer' -Value 0
          Restart-Service TermService -Force
          Start-Sleep -Seconds 10
          Get-Service TermService | Format-List

      - name: Download bore
        run: |
          Invoke-WebRequest -Uri https://github.com/ekzhang/bore/releases/download/v0.5.2/bore-v0.5.2-x86_64-pc-windows-msvc.zip -OutFile bore.zip
          Expand-Archive bore.zip -DestinationPath .

      - name: Start bore tunnel
        run: .\bore.exe local 3389 --to bore.pub
        timeout-minutes: 300
